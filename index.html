<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surprise Riddhu ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

background:linear-gradient(135deg,#1f1c2c,#928dab);

display:flex;

justify-content:center;

align-items:center;

padding:30px;

}

.card{

max-width:450px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(15px);

border-radius:25px;

padding:25px;

text-align:center;

box-shadow:0 0 30px rgba(255,255,255,.3);

animation:appear 1.5s ease;

}

img{

width:100%;

border-radius:20px;

box-shadow:0 0 20px rgba(255,255,255,.3);

}

h1{

margin-top:20px;

color:#fff;

font-size:36px;

}

.message{

margin-top:20px;

font-size:20px;

color:white;

line-height:1.8;

}

.highlight{

color:#ffd700;

font-weight:bold;

font-size:28px;

}

.quote{

margin-top:25px;

font-style:italic;

font-size:22px;

color:#ffe6e6;

}

@keyframes appear{

from{

opacity:0;

transform:scale(.8);

}

to{

opacity:1;

transform:scale(1);

}

}

</style>
</head>

<body>

<div class="card">

<!-- Put your image name here -->
<img src="1000124591.jpg" alt="Riddhisha">

<h1>Happy Birthday Riddhu ✈️🎂</h1>

<div class="message">

You are an Aviation Trainee,<br>

A dreamer who dares to touch the sky.<br><br>

Life may change,<br>

People may become distant,<br>

But one thing never changes...

</div>

<div class="highlight">

✨ The Real Surprise Is Always YOU ✨

</div>

<div class="quote">

"Keep flying higher Riddhu,<br>

because the sky is not your limit,<br>

it's just your beginning."

❤️

</div>

</div>

</body>
</html>
