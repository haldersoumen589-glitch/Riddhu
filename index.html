<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Riddhu ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4,#fbc2eb);
    overflow:hidden;
}

.container{
    text-align:center;
    animation:fadeIn 2s ease;
}

h1{
    font-size:55px;
    color:white;
    text-shadow:0 0 20px rgba(255,255,255,.7);
}

p{
    color:white;
    margin-top:20px;
    font-size:20px;
}

.btn{
    margin-top:40px;
    padding:18px 45px;
    font-size:24px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    color:#ff4b7d;
    background:white;
    box-shadow:0 0 30px rgba(255,255,255,.6);
    transition:0.4s;
    position:relative;
    overflow:hidden;
}

.btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 50px white;
}

.btn::before{
    content:'✨';
    position:absolute;
    left:-40px;
    transition:.5s;
}

.btn:hover::before{
    left:20px;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* floating hearts */
span{
    position:absolute;
    color:white;
    animation:float 8s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-10vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>Happy Birthday Riddhu ✈️❤️</h1>

<p>
An Aviation Trainee,<br>
A Dreamer,<br>
And someone who shines brighter than she knows.
</p>

<button class="btn" onclick="window.location.href='surprise.html'">
🎁 Open Surprise
</button>

</div>

<script>

for(let i=0;i<25;i++){

let heart=document.createElement("span");

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=Math.random()*25+15+"px";

heart.style.animationDuration=Math.random()*4+4+"s";

document.body.appendChild(heart);

}

</script>

</body>
</html>
